spring.application.name=smarthire-gateway
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smarthire
spring.datasource.username=smarthire
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/smarthire

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# JWT
jwt.secret=smarthire-secret-key-change-in-production
jwt.expiry-ms=900000